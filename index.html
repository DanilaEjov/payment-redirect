<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата прошла успешно</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .card { text-align: center; padding: 40px 32px; max-width: 360px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: #aaa; font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #2AABEE;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Оплата прошла успешно!</h1>
    <p id="msg"></p>
    <a class="btn" id="btn" href="#">...</a>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var platform = params.get('Shp_platform') || 'web';
    var redirectUrl, msgText, btnText;
    if (platform === 'telegram') {
      redirectUrl = 'https://t.me/SmartLab_AiBot?startapp=0870e4a2fb929e3a';
      msgText = 'Сейчас вы будете перенаправлены в Mini App…';
      btnText = 'Вернуться в Mini App';
    } else if (platform === 'max') {
      redirectUrl = 'https://max.ru/SmartLab_AiBot?startapp=0870e4a2fb929e3a';
      msgText = 'Сейчас вы будете перенаправлены в Mini App…';
      btnText = 'Вернуться в Mini App';
    } else {
      redirectUrl = 'https://smarthealth24.ru/thank-you.html';
      msgText = 'Сейчас вы будете перенаправлены на сайт…';
      btnText = 'Перейти на сайт';
    }
    document.getElementById('msg').textContent = msgText;
    document.getElementById('btn').textContent = btnText;
    document.getElementById('btn').href = redirectUrl;
   
  </script>
</body>
</html>
