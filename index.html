<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата прошла успешно</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .card {
      text-align: center;
      padding: 40px 32px;
      max-width: 360px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: #aaa; font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #2AABEE;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Оплата прошла успешно!</h1>
    <p>Сейчас вы будете перенаправлены обратно в приложение…</p>
    <a class="btn" id="btn" href="#">Вернуться в приложение</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const platform = params.get('platform') || 'web';
    const startapp = params.get('startapp') || '0870e4a2fb929e3a';

    let redirectUrl;

    if (platform === 'telegram') {
      redirectUrl = 'https://t.me/SmartLab_AiBot?startapp=' + startapp;
    } else {
      // web и max (пока) → страница спасибо на сайте
      redirectUrl = 'https://smarthealth24.ru/thank-you.html';
    }

    document.getElementById('btn').href = redirectUrl;

    setTimeout(() => {
      window.location.href = redirectUrl;
    }, 1500);
  </script>
</body>
</html>
